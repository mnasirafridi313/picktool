<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PickTool Table</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #0f0; padding: 5px; }
        input, select, button { background: #000; color: #0f0; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <input type="text" id="tableName" placeholder="Table Title">
    <button onclick="addRow()">+ Row</button>
    <button onclick="saveData()">💾 Save</button>
    <button onclick="exportCSV()">📥 Export CSV</button>

    <table id="myTable">
        <thead><tr><th>SN</th><th>Type</th><th>Val A</th><th>Val B</th><th>Result</th><th>Action</th></tr></thead>
        <tbody id="body"></tbody>
    </table>

    <script>
        let sn = 0;
        function addRow(valA=0, valB=0) {
            sn++;
            let row = document.getElementById('body').insertRow();
            row.innerHTML = `<td>${sn}</td><td><select><option>Text</option><option>Digit</option><option>Currency</option></select></td><td><input type="number" class="valA" value="${valA}"></td><td><input type="number" class="valB" value="${valB}"></td><td class="res">0</td><td><button onclick="calc(this,'+')">+</button><button onclick="calc(this,'-')">-</button></td>`;
        }

        function calc(btn, op) {
            let r = btn.parentElement.parentElement;
            let a = parseFloat(r.querySelector('.valA').value);
            let b = parseFloat(r.querySelector('.valB').value);
            r.querySelector('.res').innerText = (op=='+') ? a+b : a-b;
        }

        function saveData() {
            localStorage.setItem('tableData', document.getElementById('body').innerHTML);
            alert("Data Saved!");
        }

        function exportCSV() {
            let csv = "SN,Type,ValA,ValB,Result\n";
            // Logic to loop through rows and create CSV string would go here
            alert("Exporting CSV...");
        }

        window.onload = () => {
            let saved = localStorage.getItem('tableData');
            if(saved) document.getElementById('body').innerHTML = saved;
        }
    </script>
</body>
</html>
