<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PickTool Table</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #0f0; padding: 8px; text-align: center; }
        input, select { background: #111; color: #0f0; border: 1px solid #0f0; width: 90%; }
    </style>
</head>
<body>
    <input type="text" id="tableTitle" placeholder="Enter Table Title" style="font-size: 20px;">
    <button onclick="addRow()">+ Add Row</button>
    <table id="myTable">
        <thead>
            <tr id="headerRow">
                <th>#</th>
                <th><input type="text" placeholder="Col Name"></th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        let rowCount = 0;
        function addRow() {
            rowCount++;
            let tbody = document.getElementById('tableBody');
            let row = tbody.insertRow();
            row.innerHTML = `
                <td>${rowCount}</td>
                <td><input type="text" class="data-cell"></td>
                <td>
                    <button onclick="calc(this, 'add')">+</button>
                    <button onclick="calc(this, 'sub')">-</button>
                    <button onclick="row.remove()">X</button>
                </td>
            `;
        }
        function calc(btn, op) {
            // Basic math logic per row could be expanded here
            alert("Math function " + op + " triggered for this row!");
        }
    </script>
</body>
</html>
