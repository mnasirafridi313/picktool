<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Secret Codes - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; }
        .tool-container { background: white; border: 2px solid #3b5998; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; text-align: center; }
        .rules { font-size: 0.9em; color: #555; margin-bottom: 20px; text-align: left; }
        select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #3b5998; border-radius: 5px; cursor: pointer; }
        .result-box { margin-top: 20px; text-align: left; }
        .code-item { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 4px solid #3b5998; }
        .back-link { display: block; margin-top: 20px; color: #3b5998; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="tool-container">
    <h2>Device Secret Codes</h2>
    <div class="rules">
        Select your phone brand to view hidden service and test codes. <br>
        Use these codes carefully as they may alter system settings.
    </div>

    <select id="brand" onchange="showCodes()">
        <option value="">Select Phone Brand</option>
        <option value="general">General Android</option>
        <option value="samsung">Samsung</option>
        <option value="xiaomi">Xiaomi (Mi/Redmi)</option>
    </select>

    <div id="results" class="result-box"></div>

    <a href="../index.html" class="back-link">← Back to PickTool Home</a>
</div>

<script src="../assets/js/phone-codes.js"></script>
</body>
</html>
