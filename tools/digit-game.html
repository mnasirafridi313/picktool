<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Game</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>Digit Pattern Game</h2>
        <p>Level <span id="level-num">1</span>/20</p>
        <div id="sequence-display" style="font-size: 28px; font-weight: bold; margin: 20px 0;"></div>
        
        <input type="number" id="user-input" placeholder="Enter next number" style="width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
        
        <button onclick="checkAnswer()" style="width: 100%; padding: 15px; background-color: #3b5998; color: white; border: none; border-radius: 5px; font-size: 16px;">Submit</button>
        
        <p id="result" style="margin-top: 15px; font-weight: bold;"></p>
        
        <div style="margin-top: 20px;">
            <a href="../index.html" style="text-decoration: none; color: #3b5998;">← Back to Home</a>
        </div>
    </div>
    <script src="../assets/js/digit-game.js"></script>
</body>
</html>
