<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onet Fruit Classic</title>
    
    <!-- This links your standard website design (like the Age Calculator) -->
    <link rel="stylesheet" href="../style.css"> 
    
    <style>
        /* Only the game board mechanics stay here */
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: #8D6E63; 
            padding: 8px;
            border-radius: 8px;
            margin: 20px auto;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .tile {
            aspect-ratio: 1;
            background: #FFFDE7;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(16px, 6vw, 26px); 
            cursor: pointer;
            box-shadow: 0 3px 0 #D7CCC8;
            user-select: none;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .tile:active:not(.empty) {
            transform: translateY(3px);
            box-shadow: 0 0 0 #D7CCC8;
        }
        .tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }
        .tile.selected {
            background: #B2EBF2;
            border: 2px solid #00BCD4;
            box-shadow: 0 1px 0 #00ACC1;
            transform: translateY(2px);
        }
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .score-text {
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">&larr; Back</a>
        <h2>Onet Fruit Classic</h2>
        
        <div class="score-text">Score: <span id="score">0</span></div>
        
        <div id="game-board"></div>
        
        <div class="game-controls">
            <!-- Ensure your buttons use the same class as your Age Calculator (usually "btn") -->
            <button class="btn" onclick="initGame()">New Game</button>
            <button class="btn" onclick="shuffleGrid()">Shuffle</button>
        </div>
    </div>

    <!-- This links to your JavaScript. They MUST be in the exact same folder. -->
    <script src="onet-fruit.js"></script>
</body>
</html>
