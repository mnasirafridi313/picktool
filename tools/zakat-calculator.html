<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakat Calculator - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="calculator-container">
        <h1>Zakat Calculator</h1>
        <p>Calculate 2.5% Zakat on your total assets.</p>

        <div class="input-group">
            <label for="total-assets">Total Assets (PKR):</label>
            <input type="number" id="total-assets" placeholder="e.g., 500000">
        </div>

        <button id="calculate-btn">Calculate Zakat</button>

        <div id="result" class="result-box"></div>
        
        <a href="../index.html" class="back-link">← Back to PickTool Home</a>
    </div>

    <script src="../assets/js/zakat-calculator.js"></script>
</body>
</html>
