<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Bubble</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body { font-family: sans-serif; background-color: #f0f4f9; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { background-color: white; border: 2px solid #3b5998; border-radius: 12px; padding: 20px; width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; }
        h2 { color: #3b5998; margin-top: 0; }
        
        #gameCanvas { background: #f9f9f9; border-radius: 8px; width: 100%; height: 300px; margin-bottom: 15px; border: 1px solid #ddd; }
        
        .difficulty-controls { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn { background-color: #3b5998; color: white; border: none; border-radius: 6px; padding: 10px; font-size: 14px; flex: 1; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        
        .status { font-weight: bold; margin-bottom: 10px; color: #333; }
        .instructions { font-size: 14px; color: #555; margin-bottom: 15px; font-style: italic; }
        .back-link { display: inline-block; color: #3b5998; text-decoration: none; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Shooting Bubble</h2>
        <div class="status">Time: <span id="timer">00:00</span></div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="difficulty-controls">
            <button class="btn" onclick="startTimer(60)">1 Min</button>
            <button class="btn" onclick="startTimer(120)">2 Min</button>
            <button class="btn" onclick="startTimer(180)">3 Min</button>
        </div>
        
        <p class="instructions">Tap to aim and fire bubbles; match 3 colors to clear them.</p>
        
        <a href="../index.html" class="back-link">&larr; Back to PickTool Home</a>
    </div>

    <script src="../assets/js/shooting-bubble.js"></script>
</body>
</html>
